<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joy Design | AI Visual Lab</title>
    <style>
        :root { 
            --deep-bg: #050208; 
            --accent-purple: #1a0b2e; 
            --glow: #b19cd9;
            --text-gold: #d4af37; 
        }
        
        body { 
            background: var(--deep-bg); color: #fff; 
            font-family: "Playfair Display", "Noto Sans TC", serif; margin: 0; 
            -webkit-user-select: none; user-select: none; 
            overflow-x: hidden;
        }

        /* 燈箱背景與容器 */
        #lightbox {
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); 
            z-index: 10000; 
            cursor: zoom-out; 
            align-items: center; 
            justify-content: center;
            backdrop-filter: blur(10px); /* 增加背景模糊感，更有氣質 */
        }

        #lightbox-img {
            max-width: 90%; 
            max-height: 90%; 
            box-shadow: 0 0 50px rgba(0,0,0,0.8); 
            border: 1px solid #333;
            transition: transform 0.3s ease;
        }

        .hero {
            height: 80vh;
            background: fixed center/cover url('images/SCPE_BloodSplatter1.png');
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            position: relative;
        }
        .hero::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(26,11,46,0.3) 0%, rgba(5,2,8,0.9) 100%);
        }

        .hero-content { z-index: 2; text-align: center; }
        h1 { font-size: 4rem; letter-spacing: 15px; margin: 0; font-weight: 200; text-shadow: 0 0 20px var(--glow); }
        .tagline { font-family: sans-serif; letter-spacing: 8px; font-size: 0.7rem; color: var(--glow); margin-top: 20px; }

        .work-container { max-width: 1200px; margin: 80px auto; padding: 0 20px; }
        
        .grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 25px; 
        }
        
        .thumb {
            aspect-ratio: 1/1; 
            overflow: hidden; border: 1px solid #222; background: #000;
            position: relative; transition: 0.5s;
            cursor: zoom-in; /* 提示可以點擊放大 */
        }

        .thumb img { 
            width: 100%; height: 100%; object-fit: cover; 
            pointer-events: none; 
            transition: all 0.8s cubic-bezier(0.2, 1, 0.3, 1); 
        }

        .thumb:hover img { 
            transform: scale(1.05); 
            filter: brightness(0.7); 
        }

        /* 手機版自動變一排一格 */
        @media (max-width: 900px) {
            .grid { grid-template-columns: repeat(1, 1fr); }
            h1 { font-size: 2.5rem; letter-spacing: 8px; }
        }

        footer { 
            padding: 80px 20px; border-top: 1px solid #1a0b2e; text-align: center;
            background: #050208;
        }
        .copyright { font-size: 0.65rem; letter-spacing: 3px; color: #666; line-height: 2; }

        .reveal { opacity: 0; transform: translateY(30px); transition: 1s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
</head>
<body oncontextmenu="return false;">

    <div id="lightbox" onclick="closeLightbox()">
        <img id="lightbox-img" src="">
    </div>

    <section class="hero">
        <div class="hero-content reveal">
            <h1>JOY DESIGN</h1>
            <div class="tagline">ART DIRECTION & AI VISUAL LABORATORY</div>
        </div>
    </section>

    <div class="work-container">
        <div class="grid" id="portfolio-grid">
            </div>
    </div>

    <footer>
        <div class="copyright reveal">
            © 2026 JOY DESIGN. ALL RIGHTS RESERVED.<br>
            <span style="color:var(--text-gold)">DIRECTED BY HUMAN • POWERED BY AI</span>
        </div>
    </footer>

<script>
        // 1. 作品清單（包含妳所有的編號）
        const imageNames = [
            'a01','a02','a03','a04','a05',
            'b01','b02','b03','b04','b05',
            'c01','c02',
            'd01','d02','d03','d04','d05','d06','d07','d08','d09','d10','d11','d12','d13','d14',
            'e01','e02','e03','e04',
            'f01','f02','f03','f04','f05','f07','f09','f10','f11'
        ];

        const grid = document.getElementById('portfolio-grid');

        // 2. 自動判斷圖片格式並生成
        imageNames.forEach(name => {
            const div = document.createElement('div');
            div.className = 'thumb reveal';
            
            // 先創立一個隱形的圖片來測試格式
            const img = new Image();
            const jpgPath = `images/${name}.jpg`;
            const pngPath = `images/${name}.png`;
            
            img.src = jpgPath;
            img.onload = () => { // 如果 jpg 載入成功
                setupThumb(div, jpgPath, name);
            };
            img.onerror = () => { // 如果 jpg 失敗，改用 png
                setupThumb(div, pngPath, name);
            };
            
            grid.appendChild(div);
        });

        function setupThumb(container, path, name) {
            container.onclick = () => openLightbox(path);
            container.innerHTML = `<img src="${path}" alt="${name}">`;
        }

        // 3. 燈箱功能
        function openLightbox(src) {
            const lb = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            img.src = src;
            lb.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // 4. 滑動顯現
        function reveal() {
            var r = document.querySelectorAll('.reveal');
            for (var i = 0; i < r.length; i++) {
                var windowHeight = window.innerHeight;
                var revealTop = r[i].getBoundingClientRect().top;
                if (revealTop < windowHeight - 100) r[i].classList.add('active');
            }
        }
        window.addEventListener('scroll', reveal);
        setInterval(reveal, 500); // 週期性檢查，確保動態生成的圖也能被抓到

        document.ondragstart = function() { return false; };
    </script>
</body>
</html>
