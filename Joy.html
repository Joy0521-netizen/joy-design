<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joy Design | AI Visual Lab</title>
    <style>
        :root { 
            --deep-bg: #050208; 
            --accent-purple: #1a0b2e; 
            --glow: #b19cd9;
            --text-gold: #d4af37; 
        }
        
        body { 
            background: var(--deep-bg); color: #fff; 
            font-family: "Playfair Display", "Noto Sans TC", serif; margin: 0; 
            -webkit-user-select: none; user-select: none; 
            overflow-x: hidden;
        }

        .hero {
            height: 80vh;
            background: fixed center/cover url('images/a01.jpg'); /* 暫用a01當背景 */
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            position: relative;
        }
        .hero::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(26,11,46,0.3) 0%, rgba(5,2,8,0.9) 100%);
        }

        .hero-content { z-index: 2; text-align: center; }
        h1 { font-size: 4rem; letter-spacing: 15px; margin: 0; font-weight: 200; text-shadow: 0 0 20px var(--glow); }
        .tagline { font-family: sans-serif; letter-spacing: 8px; font-size: 0.7rem; color: var(--glow); margin-top: 20px; }

        .work-container { max-width: 1200px; margin: 80px auto; padding: 0 20px; }
        
        /* 強制一排三個的語法 */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 25px; 
        }
        
        .thumb {
            aspect-ratio: 1/1; /* 裁切成正方形會讓三格排版更像藝廊 */
            overflow: hidden; border: 1px solid #222; background: #000;
            position: relative; transition: 0.5s;
        }
        .thumb img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; transition: 1s; }
        .thumb:hover img { transform: scale(1.1); filter: brightness(1.2); }

        /* 手機版自動變一排一格 */
        @media (max-width: 900px) {
            .grid { grid-template-columns: repeat(1, 1fr); }
            h1 { font-size: 2.5rem; letter-spacing: 8px; }
        }

        footer { 
            padding: 80px 20px; border-top: 1px solid #1a0b2e; text-align: center;
            background: #050208;
        }
        .copyright { font-size: 0.65rem; letter-spacing: 3px; color: #666; line-height: 2; }

        .reveal { opacity: 0; transform: translateY(30px); transition: 1s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
</head>
<body oncontextmenu="return false;">

    <section class="hero">
        <div class="hero-content reveal">
            <h1>JOY DESIGN</h1>
            <div class="tagline">ART DIRECTION & AI VISUAL LABORATORY</div>
        </div>
    </section>

    <div class="work-container">
        <div class="grid">
            <div class="thumb reveal"><img src="images/a01.jpg"></div>
            <div class="thumb reveal"><img src="images/a02.jpg"></div>
            <div class="thumb reveal"><img src="images/a03.jpg"></div>
            <div class="thumb reveal"><img src="images/a04.jpg"></div>
            <div class="thumb reveal"><img src="images/a05.jpg"></div>
            <div class="thumb reveal"><img src="images/b01.jpg"></div>
            <div class="thumb reveal"><img src="images/b02.jpg"></div>
            <div class="thumb reveal"><img src="images/b03.jpg"></div>
            <div class="thumb reveal"><img src="images/b04.jpg"></div>
            <div class="thumb reveal"><img src="images/b05.jpg"></div>
        </div>
    </div>

    <footer>
        <div class="copyright reveal">
            © 2026 JOY DESIGN. ALL RIGHTS RESERVED.<br>
            <span style="color:var(--text-gold)">DIRECTED BY HUMAN • POWERED BY AI</span>
        </div>
    </footer>

    <script>
        function reveal() {
            var r = document.querySelectorAll('.reveal');
            for (var i = 0; i < r.length; i++) {
                var windowHeight = window.innerHeight;
                var revealTop = r[i].getBoundingClientRect().top;
                if (revealTop < windowHeight - 100) r[i].classList.add('active');
            }
        }
        window.addEventListener('scroll', reveal);
        reveal();
        document.ondragstart = function() { return false; };
    </script>
</body>
</html>
